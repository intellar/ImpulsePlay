; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-supermini-n4r2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.filesystem = littlefs
board_build.partitions = default.csv
monitor_speed = 115200
board_build.arduino.cdc_on_boot = 1
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
	-D USER_SETUP_LOADED=1
	
	-D ILI9341_DRIVER=1
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	
	-D TFT_MOSI=11
	-D TFT_SCLK=12
	-D TFT_MISO=13
	
	-D TFT_DC=9
	-D TFT_RST=8
	-D TFT_CS=5
    	
	; Broche pour le contrôle du rétroéclairage (Backlight)
	-D TFT_BL=4
	; Certains écrans s'allument avec un état BAS (LOW). Décommentez si l'écran est noir.
	-D TFT_BACKLIGHT_ON=HIGH	

	; Forcer l'utilisation du port HSPI pour l'ESP32-S3
	-D USE_HSPI_PORT

	; Fix color channel order on some ILI9341 panels
	-D TFT_BYTES_SWAPPED
	-D TFT_RGB_ORDER=TFT_BGR

	; Activation du tactile sur la broche GPIO 1
	-D TOUCH_CS=1
	
	-D SPI_FREQUENCY=80000000
	-D SMOOTH_FONT=1
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
	https://github.com/boschsensortec/BMI160_SensorAPI
